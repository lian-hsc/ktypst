name: Gradle Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main,test-new-branch]

permissions:
  contents: read

jobs:
  discover-subprojects:
    name: Discover subprojects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.discover.outputs.projects }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Gradle projects
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dirs < <(
            find . -name build.gradle.kts -print \
              | sed 's#^\./##' \
              | sed 's#^\(build\.gradle\.kts\)$#.#' \
              | sed 's#/build.gradle.kts$##' \
              | sort
          )
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo 'projects=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json="$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -sc 'map(if . == "." then ":" else ":" + gsub("/"; ":") end)')"
          echo "projects=$json" >> "$GITHUB_OUTPUT"

  gradle-check:
    name: Check ${{ matrix.project }}
    needs: discover-subprojects
    if: ${{ needs.discover-subprojects.outputs.projects != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover-subprojects.outputs.projects) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.14.2

      - name: Run check for project
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.project }}" = ":" ]; then
            ./gradlew --no-daemon :check
          else
            ./gradlew --no-daemon ${{ matrix.project }}:check
          fi

      - name: Resolve project paths
        if: always()
        id: project-paths
        shell: bash
        run: |
          set -euo pipefail
          project_dir="${{ matrix.project }}"
          if [ "$project_dir" = ":" ]; then
            project_dir="."
            artifact_suffix="root"
          else
            project_dir="${project_dir#:}"
            project_dir="${project_dir//:/\/}"
            artifact_suffix="${project_dir//\//-}"
          fi
          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=$artifact_suffix" >> "$GITHUB_OUTPUT"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ steps.project-paths.outputs.artifact_suffix }}
          if-no-files-found: warn
          path: |
            ${{ steps.project-paths.outputs.project_dir }}/build/reports/tests/test/**
            ${{ steps.project-paths.outputs.project_dir }}/build/test-results/test/**

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports-${{ steps.project-paths.outputs.artifact_suffix }}
          if-no-files-found: warn
          path: |
            ${{ steps.project-paths.outputs.project_dir }}/build/reports/detekt/**

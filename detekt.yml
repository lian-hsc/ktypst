config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

comments:
  DeprecatedBlockTag:
    active: true
  EndOfSentenceFormat:
    active: true
  KDocReferencesNonPublicProperty:
    active: true
  OutdatedDocumentation:
    active: true

complexity:
  LabeledExpression:
    active: true
  NamedArguments:
    active: true
    ignoreArgumentsMatchingNames: true

coroutines:
  CoroutineLaunchedInTestWithoutRunTest:
    active: true
  GlobalCoroutineUsage:
    active: true

exceptions:
  NotImplementedDeclaration:
    active: true
  ObjectExtendsThrowable:
    active: true

performance:
  CouldBeSequence:
    active: true
  UnnecessaryInitOnArray:
    active: true
  UnnecessaryTypeCasting:
    active: true

potential-bugs:
  CastNullableToNonNullableType:
    active: true
  CharArrayToStringCall:
    active: true
  Deprecation:
    active: true
  ExitOutsideMain:
    active: true
  ImplicitUnitReturnType:
    active: true
  MissingPackageDeclaration:
    active: true
  MissingUseCall:
    active: true
  NullCheckOnMutableProperty:
    active: true
  NullableToStringCall:
    active: true
  PropertyUsedBeforeDeclaration:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
  UnnecessaryNotNullCheck:
    active: true

style:
  WildcardImport:
    active: false
